<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绿佳电动车招商峰会 - 终极震撼版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #000; min-height: 100vh; overflow-x: hidden; }
        
        /* 主容器 */
        .container { width: 100%; min-height: 100vh; background: linear-gradient(180deg, #8B0000 0%, #C41E3A 50%, #8B0000 100%); position: relative; overflow: hidden; animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        /* 闪光粒子 */
        .sparkle { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; animation: sparkle 4s infinite; box-shadow: 0 0 20px 4px rgba(255, 215, 0, 0.9); }
        @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0) translateY(0); } 50% { opacity: 1; transform: scale(1.5) translateY(-30px); } }
        .sparkle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 20%; right: 8%; animation-delay: 0.6s; }
        .sparkle:nth-child(3) { top: 40%; left: 12%; animation-delay: 1.2s; }
        .sparkle:nth-child(4) { top: 60%; right: 10%; animation-delay: 1.8s; }
        .sparkle:nth-child(5) { top: 80%; left: 7%; animation-delay: 2.4s; }
        
        /* 火焰光效 */
        .fire-glow { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255, 165, 0, 0.6) 0%, rgba(255, 69, 0, 0.4) 50%, transparent 70%); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 1; } }
        
        /* 顶部装饰 */
        .header-decoration { background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FFD700 100%); height: 10px; width: 100%; }
        
        /* Logo区域 */
        .logo-section { text-align: center; padding: 40px 20px 20px; }
        .logo { display: inline-flex; align-items: center; justify-content: center; width: 100px; height: 100px; background: radial-gradient(circle, #E63950, #C41E3A); border-radius: 50%; border: 5px solid #FFD700; margin-bottom: 15px; animation: rotate 4s ease-in-out infinite; }
        @keyframes rotate { 0%, 100% { transform: translateY(0) rotateY(0deg); } 50% { transform: translateY(-10px) rotateY(360deg); } }
        .logo-text { color: #fff; font-size: 30px; font-weight: 900; }
        .brand-name { color: #FFD700; font-size: 40px; font-weight: 900; letter-spacing: 12px; text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); } 50% { text-shadow: 0 0 50px rgba(255, 215, 0, 1); } }
        
        /* 主标题 */
        .main-title { text-align: center; padding: 20px; }
        .title-wrapper { position: relative; display: inline-block; padding: 25px 35px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 215, 0, 0.4); border-radius: 20px; backdrop-filter: blur(10px); animation: pulse2 3s ease-in-out infinite; }
        @keyframes pulse2 { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .title-calligraphy { color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 5px; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); animation: lightning 3s ease-in-out infinite; }
        @keyframes lightning { 0%, 90%, 100% { text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); } 95% { text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5), 0 0 60px rgba(255, 215, 0, 1); } }
        .subtitle { color: #FFD700; font-size: 17px; font-weight: 500; letter-spacing: 2px; }
        
        /* 邀请函卡片（3D翻转） */
        .invitation-card { background: rgba(255, 255, 255, 0.95); margin: 30px 18px; border-radius: 24px; padding: 40px 28px; position: relative; animation: flip 1.5s ease-out 0.5s both; transform-style: preserve-3d; }
        @keyframes flip { 0% { transform: rotateY(-180deg) scale(0.8); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
        .bow-decoration { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 45px; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-50%) rotate(5deg); } 75% { transform: translateX(-50%) rotate(-5deg); } }
        .card-header { text-align: center; margin-bottom: 35px; }
        .invitation-title { color: #C41E3A; font-size: 52px; font-weight: 900; letter-spacing: 14px; animation: shine 3s ease-in-out infinite; }
        @keyframes shine { 0%, 100% { color: #C41E3A; } 50% { color: #DC143C; text-shadow: 0 0 30px rgba(255, 215, 0, 0.5); } }
        .invitation-subtitle { color: #FFA500; font-size: 15px; letter-spacing: 5px; font-weight: 600; text-transform: uppercase; }
        
        /* 活动信息 */
        .event-info { margin-bottom: 32px; }
        .info-item { display: flex; align-items: flex-start; margin-bottom: 18px; padding: 20px 18px; background: linear-gradient(135deg, #FFF8DC 0%, #FFFAF0 100%); border-radius: 14px; border-left: 4px solid #C41E3A; animation: slideIn 0.5s ease-out backwards; }
        @keyframes slideIn { from { transform: translateX(-50px) scale(0.8); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        .info-icon { width: 28px; height: 28px; margin-right: 16px; font-size: 24px; color: #C41E3A; }
        .info-label { color: #666; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .info-value { color: #222; font-size: 16px; font-weight: 700; }
        
        /* 会议亮点 */
        .highlights { margin-bottom: 32px; }
        .section-title { color: #C41E3A; font-size: 19px; font-weight: 800; text-align: center; margin-bottom: 20px; padding-bottom: 14px; letter-spacing: 3px; position: relative; }
        .section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 3px; background: linear-gradient(90deg, transparent, #FFD700, transparent); border-radius: 2px; }
        .highlight-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .highlight-item { background: linear-gradient(135deg, #C41E3A 0%, #8B0000 100%); color: #fff; padding: 18px 14px; border-radius: 14px; text-align: center; font-size: 15px; font-weight: 600; animation: pop 0.5s ease-out backwards; transition: all 0.3s; }
        @keyframes pop { from { transform: scale(0) rotateY(180deg); opacity: 0; } to { transform: scale(1) rotateY(0deg); opacity: 1; } }
        .highlight-item:hover { transform: translateY(-8px) scale(1.08) rotateX(10deg); box-shadow: 0 15px 40px rgba(196, 30, 58, 0.5); }
        
        /* 联系人信息 */
        .contact-section { background: rgba(255, 215, 0, 0.1); border-radius: 16px; padding: 20px 18px; margin-bottom: 32px; border: 2px solid rgba(255, 215, 0, 0.3); }
        .contact-title { color: #C41E3A; font-size: 16px; font-weight: 800; text-align: center; margin-bottom: 18px; letter-spacing: 3px; }
        .contact-item { display: flex; align-items: center; padding: 14px; background: rgba(255, 255, 255, 0.8); border-radius: 12px; margin-bottom: 12px; border-left: 3px solid #C41E3A; animation: slideIn 0.5s ease-out backwards; transition: all 0.3s; }
        .contact-item:hover { transform: translateX(10px) scale(1.05); }
        .contact-name { color: #222; font-size: 15px; font-weight: 700; margin-right: 10px; min-width: 75px; }
        .contact-phone { color: #C41E3A; font-size: 15px; font-weight: 800; }
        .contact-area { color: #666; font-size: 12px; margin-left: auto; font-weight: 600; }
        
        /* CTA按钮（火焰效果） */
        .cta-section { text-align: center; margin-bottom: 30px; }
        .cta-phone { color: #C41E3A; font-size: 24px; font-weight: 800; margin-bottom: 20px; letter-spacing: 2px; }
        .cta-button { display: inline-block; background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%); color: #8B0000; padding: 18px 50px; border-radius: 50px; font-size: 20px; font-weight: 900; letter-spacing: 5px; text-decoration: none; animation: ctaPulse 2s ease-in-out infinite; position: relative; overflow: hidden; cursor: pointer; border: none; }
        @keyframes ctaPulse { 0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255, 215, 0, 0.7), 0 0 40px rgba(255, 165, 0, 0.6); } }
        .cta-button::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%, transparent); animation: shine3 3s infinite; }
        @keyframes shine3 { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }
        .cta-button:hover { transform: translateY(-5px) scale(1.08); box-shadow: 0 15px 50px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 165, 0, 0.8); }
        
        /* 烟花容器 */
        .fireworks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; }
        .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: explode 1.5s ease-out forwards; }
        @keyframes explode { from { transform: translate(0, 0) scale(1); opacity: 1; } to { transform: translate(var(--fx), var(--fy)) scale(0); opacity: 0; } }
        
        /* 底部装饰 */
        .footer-decoration { background: linear-gradient(180deg, #FFA500 0%, #FFD700 50%, #FFA500 100%); height: 10px; width: 100%; position: absolute; bottom: 0; left: 0; }
        .footer-text { text-align: center; color: rgba(255, 215, 0, 0.9); font-size: 14px; padding: 35px 20px; font-weight: 500; letter-spacing: 2px; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .brand-name { font-size: 32px; letter-spacing: 8px; }
            .title-calligraphy { font-size: 24px; }
            .invitation-title { font-size: 42px; letter-spacing: 10px; }
            .highlight-grid { grid-template-columns: 1fr; }
            .cta-button { padding: 15px 40px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="fireworks-container" id="fireworksContainer"></div>

        <div class="fire-glow" style="top: 40%; right: 15%; animation-delay: 1s;"></div>

        <div class="footer-decoration"></div>
    </div>
    
    <script>
        function triggerFireworks(event) {
            const container = document.getElementById('fireworksContainer');
            const colors = ['#FFD700', '#FFA500', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = event.clientX || (window.innerWidth / 2);
                    const y = event.clientY || (window.innerHeight / 2);
                    for (let j = 0; j < 30; j++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework';
                        const angle = (j / 30) * Math.PI * 2;
                        const distance = Math.random() * 200 + 100;
                        particle.style.setProperty('--fx', Math.cos(angle) * distance + 'px');
                        particle.style.setProperty('--fy', Math.sin(angle) * distance + 'px');
                        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.left = x + 'px';
                        particle.style.top = y + 'px';
                        particle.style.boxShadow = `0 0 ${Math.random() * 10 + 5}px ${particle.style.backgroundColor}`;
                        container.appendChild(particle);
                        setTimeout(() => particle.remove(), 1500);
                    }
                }, i * 200);
            }
        }
        
        if ('ontouchstart' in window) {
            document.querySelector('.cta-button').addEventListener('touchstart', function(e) {
                e.preventDefault();
                triggerFireworks(e);
                window.location.href = this.getAttribute('href');
            });
        }
    </script>

</html>
