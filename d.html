<!DOCTYPE html>
<html lang="zh-CN">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #000; min-height: 100vh; overflow-x: hidden; }
        
        /* 主容器 */
        .container { width: 100%; min-height: 100vh; background: linear-gradient(180deg, #8B0000 0%, #C41E3A 50%, #8B0000 100%); position: relative; overflow: hidden; animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        /* 闪光粒子 */
        .sparkle { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; animation: sparkle 4s infinite; box-shadow: 0 0 20px 4px rgba(255, 215, 0, 0.9); }
        @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0) translateY(0); } 50% { opacity: 1; transform: scale(1.5) translateY(-30px); } }
        .sparkle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 20%; right: 8%; animation-delay: 0.6s; }
        .sparkle:nth-child(3) { top: 40%; left: 12%; animation-delay: 1.2s; }
        .sparkle:nth-child(4) { top: 60%; right: 10%; animation-delay: 1.8s; }
        .sparkle:nth-child(5) { top: 80%; left: 7%; animation-delay: 2.4s; }
        
        /* 火焰光效 */
        .fire-glow { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255, 165, 0, 0.6) 0%, rgba(255, 69, 0, 0.4) 50%, transparent 70%); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 1; } }
        
        /* 顶部装饰 */
        .header-decoration { background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FFD700 100%); height: 10px; width: 100%; }
        
        /* Logo区域 */
        .logo-section { text-align: center; padding: 40px 20px 20px; }
        .logo { display: inline-flex; align-items: center; justify-content: center; width: 100px; height: 100px; background: radial-gradient(circle, #E63950, #C41E3A); border-radius: 50%; border: 5px solid #FFD700; margin-bottom: 15px; animation: rotate 4s ease-in-out infinite; }
        @keyframes rotate { 0%, 100% { transform: translateY(0) rotateY(0deg); } 50% { transform: translateY(-10px) rotateY(360deg); } }
        .logo-text { color: #fff; font-size: 30px; font-weight: 900; }

        @keyframes glow { 0%, 100% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); } 50% { text-shadow: 0 0 50px rgba(255, 215, 0, 1); } }
        
        /* 主标题 */
        .main-title { text-align: center; padding: 20px; }

        @keyframes pulse2 { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .title-calligraphy { color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 5px; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); animation: lightning 3s ease-in-out infinite; }

        .subtitle { color: #FFD700; font-size: 17px; font-weight: 500; letter-spacing: 2px; }
